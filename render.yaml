services:
  - type: web
    name: agritrack-api
    runtime: php
    plan: starter
    region: frankfurt
    buildCommand: |
      composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
      php artisan storage:link || true
      php artisan config:cache
      php artisan route:cache
      php artisan migrate --force
    startCommand: vendor/bin/heroku-php-apache2 public/
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: AgriTrack API
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        sync: false
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: SANCTUM_TOKEN_EXPIRATION
        value: "10080"
